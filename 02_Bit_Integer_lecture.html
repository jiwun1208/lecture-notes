{

      <div class="explanation">

// ===== Slide 2: Great Reality #1 (PDF p2) =====
{

  render: function(c) {
    c.innerHTML = `
      <div class="explanation">
        <p>컴퓨터의 숫자는 수학의 숫자와 <strong>다르게 동작</strong>합니다.</p>
        <p><strong>예제 1:</strong> \\(x^2 \\geq 0\\)은 항상 참인가?</p>
        <p><em>Float</em>: Yes! &nbsp;&nbsp; <em>Int</em>: 항상 그렇지 않다!</p>
        <div class="code-block">40000 * 40000 = 1,600,000,000   (OK, 21억 이내)
50000 * 50000 = 2,500,000,000   (32비트 int 최대값 초과 → 오버플로우!)</div>
        <p>32비트 int의 최대값은 \\(2^{31}-1 = 2{,}147{,}483{,}647\\)이므로, 25억은 이 범위를 넘어 <strong>음수</strong>가 되어버립니다. 제곱인데 음수? 수학적으로 불가능하지만 컴퓨터에서는 발생합니다.</p>

        <p><strong>예제 2:</strong> \\((x+y)+z = x+(y+z)\\) 결합법칙이 성립하는가?</p>
        <p><em>정수</em>: Yes! &nbsp;&nbsp; <em>Float</em>: No!</p>
        <div class="code-block">(1e20 + -1e20) + 3.14 = 0 + 3.14 = 3.14     ✅
 1e20 + (-1e20 + 3.14) = 1e20 + (-1e20) = 0.0  ❌</div>

        <div class="highlight-box">
          <strong>전압 구간:</strong><br>

          • 0.0V ~ 0.2V → "낮은 전압" (논리적 <em>0</em>)<br>
          • 0.2V ~ 0.9V → 불확실 영역 (사용하지 않음)

        <div class="key-point">추상화 덕분에 전선에 잡음이 섞여도, 임계값만 넘으면 1, 밑이면 0으로 <em>안정적으로</em> 신호를 전달할 수 있습니다.</div>

// ===== Slide 5: Everything is bits (PDF p5) =====
{
  title: "Everything is Bits — 모든 것은 비트다",
  render: function(c) {
    c.innerHTML = `
      <div class="explanation">
        <p><strong>비트(Bit)</strong> = Binary Digit. 0 또는 1, 단 두 가지 값만 가지는 정보의 최소 단위입니다.</p>
        <div class="highlight-box">
          <strong>왜 비트가 유용한가?</strong><br>
          • 잡음이 있는 전선에서도 안정적으로 전달 가능<br>
          • <strong>양안정 소자(bistable element)</strong>로 쉽게 저장 — 0 또는 1 중 하나를 안정적으로 유지하는 회로 소자
        </div>
        <p>비트의 <strong>집합</strong>을 다양한 방식으로 <em>인코딩/해석</em>하면:</p>

      </div>`;
  }
},

        <p>과학적 표기법도 가능합니다:</p>

// --- Navigation ---
let cur = 0;
function renderSlide() {
  const app = document.getElementById('content');
  app.innerHTML = '';
  const nav = document.createElement('div');
  nav.className = 'nav';
  nav.innerHTML = '<button onclick="goSlide(0)">목차</button>' +
    '<button onclick="prev()"' + (cur===0?' disabled':'') + '>◀ 이전</button>' +
    '<span class="slide-num">' + (cur+1) + ' / ' + slides.length + '</span>' +
    '<button onclick="next()"' + (cur===slides.length-1?' disabled':'') + '>다음 ▶</button>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + ((cur+1)/slides.length*100) + '%"></div></div>';
  app.appendChild(nav);
  const slide = document.createElement('div');
  slide.className = 'slide';
  const t = document.createElement('div');
  t.className = 'slide-title';
  t.innerHTML = '<span class="num">' + (cur+1) + '</span>' + slides[cur].title;
  slide.appendChild(t);
  const body = document.createElement('div');
  slides[cur].render(body);
  slide.appendChild(body);
  app.appendChild(slide);
  window.scrollTo({top:0,behavior:'smooth'});
  // 모든 슬라이드 렌더링 후 MathJax typeset 호출
  if(window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([slide]).catch(function(err){});
  }
}
function next(){if(cur<slides.length-1){cur++;renderSlide()}}
function prev(){if(cur>0){cur--;renderSlide()}}
function goSlide(n){cur=n;renderSlide()}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
renderSlide();
</script>
