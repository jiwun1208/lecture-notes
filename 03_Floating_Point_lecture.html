{title:"강의 개요",render:function(c){c.innerHTML=`

// ===== 1: 표지 (p1) =====
{title:"강의 소개 — Floating Point",render:function(c){c.innerHTML=`
<div class="explanation">
<div class="highlight-box">
<strong>과목:</strong> System Programming (CSE306) · DGIST<br>
<strong>주제:</strong> Chapter 3 — Floating Point<br>
<strong>담당:</strong> Prof. Yongwoo Lee
</div>
<p>이전 챕터에서 정수의 비트 표현을 배웠습니다. 이번에는 <strong>실수(소수점이 있는 수)</strong>를 비트로 표현하는 방법인 <em>부동소수점(Floating Point)</em>을 다룹니다.</p>
</div>`}},
// ===== 2: Great Reality #1 복습 (p2) =====
{title:"Great Reality #1 — 복습",render:function(c){c.innerHTML=`
<div class="explanation">
<p>이전 챕터에서 본 핵심 메시지를 다시 확인합니다:</p>
<p><strong>예제 1:</strong> \\(x^2 \\geq 0\\)? — Int에서는 오버플로우로 음수 가능, Float에서는 항상 참</p>
<p><strong>예제 2:</strong> \\((x+y)+z = x+(y+z)\\)? — Int에서는 참, <em>Float에서는 거짓!</em></p>
<div class="code-block">(1e20 + -1e20) + 3.14 = 3.14   ✅
 1e20 + (-1e20 + 3.14) = 0.0    ❌  ← 3.14가 정밀도 한계로 사라짐</div>
<div class="warning-box">이번 챕터를 통해 Float에서 <strong>왜</strong> 결합법칙이 성립하지 않는지를 완벽히 이해하게 됩니다.</div>
</div>`}},
// ===== 3: 로드맵 (p3) =====
{title:"로드맵",render:function(c){c.innerHTML=`
<div class="explanation">
<table class="info-table">
<tr><th>파트</th><th>내용</th></tr>
<tr><td><strong>1. 이진 소수</strong></td><td>소수점 이하를 이진수로 표현하는 방법</td></tr>
<tr><td><strong>2. IEEE 754</strong></td><td>부동소수점 표준의 정의 — sign, exponent, fraction</td></tr>
<tr><td><strong>3. 예제와 성질</strong></td><td>Normalized, Denormalized, Special Values, 수의 분포</td></tr>
<tr><td><strong>4. Rounding</strong></td><td>반올림 방식과 Round-to-Even</td></tr>
<tr><td><strong>5. 연산</strong></td><td>덧셈, 곱셈의 수학적 성질</td></tr>
<tr><td><strong>6. C에서의 FP</strong></td><td>float/double 변환, 퍼즐</td></tr>
</table>
</div>`}},
// ===== 4: Fractional binary quiz (p4) =====
{title:"이진 소수 — 퀴즈",render:function(c){c.innerHTML=`
<div class="explanation">
<p>먼저 질문: <strong>\\(1011.101_2\\)</strong>는 십진수로 얼마일까요?</p>
<div class="math-block">
\\(1 \\times 2^3 + 0 \\times 2^2 + 1 \\times 2^1 + 1 \\times 2^0 + 1 \\times 2^{-1} + 0 \\times 2^{-2} + 1 \\times 2^{-3}\\)
\\(= 8 + 0 + 2 + 1 + 0.5 + 0 + 0.125 = 11.625\\)
</div>
<p>소수점 왼쪽은 \\(2^0, 2^1, 2^2, \\ldots\\) (정수 부분), 오른쪽은 \\(2^{-1}, 2^{-2}, 2^{-3}, \\ldots\\) (소수 부분)입니다.</p>
</div>`}},
// ===== 5: Fractional Binary Numbers (p5) =====
{title:"이진 소수 표현 — Fractional Binary Numbers",render:function(c){c.innerHTML=`
<div class="explanation">
<p>이진수에서 <strong>"binary point"</strong>(소수점) 오른쪽의 비트는 2의 음의 거듭제곱을 나타냅니다:</p>
<div class="math-block">
\\(b_i b_{i-1} \\cdots b_1 b_0 \\;.\\; b_{-1} b_{-2} b_{-3} \\cdots b_{-j}\\)
\\(= \\sum_{k=-j}^{i} b_k \\times 2^k\\)
</div>
<p>소수점 오른쪽: \\(b_{-1} = 1/2\\), \\(b_{-2} = 1/4\\), \\(b_{-3} = 1/8\\), ...</p>
</div>`}},
// ===== 6: Fractional Examples (p6) =====
{title:"이진 소수 예제",render:function(c){c.innerHTML=`
<div class="explanation">
<table class="info-table">
<tr><th>십진수</th><th>이진수</th><th>계산</th></tr>
<tr><td>5 3/4</td><td>\\(101.11_2\\)</td><td>4+1+0.5+0.25</td></tr>
<tr><td>2 7/8</td><td>\\(010.111_2\\)</td><td>2+0.5+0.25+0.125</td></tr>
<tr><td>1 7/16</td><td>\\(001.0111_2\\)</td><td>1+0.25+0.125+0.0625</td></tr>
</table>
<div class="highlight-box">
<strong>관찰:</strong><br>
• 오른쪽 시프트(>>1) = 2로 나누기 (정수와 동일)<br>
• 왼쪽 시프트(<<1) = 2 곱하기<br>
• \\(0.111\\ldots_2 = 1/2 + 1/4 + 1/8 + \\cdots \\to 1.0\\) (무한급수). 이를 \\(1.0 - \\varepsilon\\)으로 표기
</div>
</div>`}},
// ===== 7: Representable Numbers (p7) =====
{title:"표현 가능한 수의 한계",render:function(c){c.innerHTML=`
<div class="explanation">
<p><strong>한계 1: 정확히 표현 가능한 수가 제한적</strong></p>
<p>\\(x / 2^k\\) 형태만 정확히 표현됩니다. 그 외는 <em>무한 순환소수</em>가 됩니다:</p>
<div class="code-block">1/3  = 0.0101010101[01]...₂   ← 무한 반복
1/5  = 0.001100110011[0011]...₂
1/10 = 0.0001100110011[0011]...₂</div>
<div class="warning-box"><strong>0.1</strong>을 이진수로 정확히 표현할 수 없습니다! 이것이 <span style="color:var(--purple)">0.1 + 0.2 ≠ 0.3</span> 문제의 근본 원인입니다.</div>
<p><strong>한계 2: 고정된 소수점 위치</strong></p>
<p>w비트 내에서 소수점 위치가 고정되면, 표현 가능한 수의 범위가 매우 제한됩니다. 아주 작은 수나 아주 큰 수를 동시에 표현할 수 없습니다. → 이것이 <strong>부동(floating) 소수점</strong>이 필요한 이유!</p>
</div>`}},
// ===== 8: 로드맵 - IEEE (p8) =====
{title:"로드맵 — IEEE 표준",render:function(c){c.innerHTML=`
<div class="explanation">
<div class="section-divider">— IEEE Floating Point Standard —</div>
<p>고정 소수점의 한계를 극복하기 위해 <strong>소수점 위치를 "떠다니게"</strong> 하는 표현 방식을 배웁니다.</p>
</div>`}},
// ===== 9: IEEE Floating Point (p9) =====
{title:"IEEE 754 — 부동소수점 표준",render:function(c){c.innerHTML=`
<div class="explanation">
<p><strong>IEEE Standard 754</strong> (1985년 제정)는 부동소수점 산술의 <em>통일 표준</em>입니다. 이전에는 제조사마다 다른 형식을 사용해 혼란이 있었습니다.</p>
<div class="key-point">모든 주요 CPU가 이 표준을 지원합니다. 반올림, 오버플로우, 언더플로우에 대한 명확한 규칙을 제공합니다.</div>
<p>하드웨어에서 빠르게 구현하기 어렵지만, 수치 해석학자들의 요구가 반영된 표준입니다.</p>
</div>`}},
// ===== 10: FP Representation (p10) =====
{title:"부동소수점 표현 — 구조",render:function(c){c.innerHTML=`
<div class="explanation">
<p>부동소수점 수의 수학적 형태:</p>
<div class="math-block">
\\(v = (-1)^s \\times M \\times 2^E\\)
</div>
<table class="info-table">
<tr><th>구성 요소</th><th>의미</th><th>비트 필드</th></tr>
<tr><td><strong>s</strong> (Sign)</td><td>부호: 0=양수, 1=음수</td><td>최상위 1비트</td></tr>
<tr><td><strong>M</strong> (Significand)</td><td>유효숫자, 보통 \\([1.0, 2.0)\\) 범위</td><td>frac 필드로 인코딩 (M ≠ frac)</td></tr>
<tr><td><strong>E</strong> (Exponent)</td><td>2의 지수, 스케일 결정</td><td>exp 필드로 인코딩 (E ≠ exp)</td></tr>
</table>
<div class="code-block">  [s] [  exp  ] [       frac        ]
   1    k bits        n bits</div>
<div class="warning-box"><strong>주의:</strong> exp 필드의 값이 직접 E가 아니고, frac 필드의 값이 직접 M이 아닙니다. 인코딩 규칙이 따로 있습니다.</div>
</div>`}},
// ===== 11: Precision options (p11) =====
{title:"정밀도 옵션 — Single / Double / Extended",render:function(c){c.innerHTML=`
<div class="explanation">
<table class="info-table">
<tr><th>정밀도</th><th>총 비트</th><th>s</th><th>exp</th><th>frac</th></tr>
<tr><td><strong>Single (float)</strong></td><td>32</td><td>1</td><td>8</td><td>23</td></tr>
<tr><td><strong>Double (double)</strong></td><td>64</td><td>1</td><td>11</td><td>52</td></tr>
<tr><td><strong>Extended</strong></td><td>80</td><td>1</td><td>15</td><td>63/64</td></tr>
</table>
<div class="key-point">
<strong>Single (float):</strong> 약 7자리 십진수 정밀도<br>
<strong>Double (double):</strong> 약 15~16자리 십진수 정밀도<br>
Extended는 Intel 전용이며 long double에 해당합니다.
</div>
</div>`}},
// ===== 12: Normalized Values (p12) =====
{title:"Normalized Values — 정규화된 값",render:function(c){c.innerHTML=`
<div class="explanation">
<p><strong>조건:</strong> exp ≠ 000...0 이고 exp ≠ 111...1 일 때 (대부분의 수)</p>
<p><strong>Exponent 인코딩:</strong></p>
<div class="math-block">
\\(E = Exp - Bias\\)<br>
\\(Bias = 2^{k-1} - 1\\) (k = exp 비트 수)
</div>
<table class="info-table">
<tr><th></th><th>Bias</th><th>Exp 범위</th><th>E 범위</th></tr>
<tr><td>Single (8bit exp)</td><td>127</td><td>1 ~ 254</td><td>-126 ~ +127</td></tr>
<tr><td>Double (11bit exp)</td><td>1023</td><td>1 ~ 2046</td><td>-1022 ~ +1023</td></tr>
</table>
<p><strong>Significand 인코딩:</strong> 암묵적 선행 1(implied leading 1)을 가집니다:</p>
<div class="math-block">
\\(M = 1.xxx\\ldots x_2\\) (frac 필드가 xxx...x)
</div>
<p>frac = 000...0이면 \\(M = 1.0\\), frac = 111...1이면 \\(M = 2.0 - \\varepsilon\\). "공짜로" 1비트를 더 얻는 셈입니다!</p>
</div>`}},
// ===== 13: Normalized Example (p13) =====
{title:"Normalized 인코딩 예제 — 15213.0",render:function(c){c.innerHTML=`
<div class="explanation">
<p><span style="color:var(--purple)">float F = 15213.0;</span>을 인코딩해봅시다:</p>
<div class="code-block">15213₁₀ = 11101101101101₂
        = 1.1101101101101₂ × 2¹³</div>
<p><strong>Significand:</strong></p>
<div class="math-block">
\\(M = 1.1101101101101_2\\)<br>
frac = 11011011011010000000000₂ (23비트, 소수점 뒤 부분)
</div>
<p><strong>Exponent:</strong></p>
<div class="math-block">
\\(E = 13, \\quad Bias = 127\\)<br>
\\(Exp = E + Bias = 13 + 127 = 140 = 10001100_2\\)
</div>
<div class="code-block">결과: 0  10001100  11011011011010000000000
      s    exp              frac</div>
</div>`}},
// ===== 14: Denormalized Values (p14) =====
{title:"Denormalized Values — 비정규화된 값",render:function(c){c.innerHTML=`
<div class="explanation">
<p><strong>조건:</strong> exp = 000...0 일 때</p>
<p>Normalized와 다른 두 가지 규칙:</p>
<div class="highlight-box">
<strong>1. Exponent:</strong> \\(E = 1 - Bias\\) (0 - Bias가 아님!)<br>
<strong>2. Significand:</strong> \\(M = 0.xxx\\ldots x_2\\) (선행 1 대신 <em>선행 0</em>)
</div>

{title:"부동소수점 덧셈",render:function(c){c.innerHTML=`

4. <strong>오버플로우 체크:</strong> E가 범위 초과하면 ±∞<br>

</div>

// ===== 33: FP in C (p33) =====
{title:"C에서의 Floating Point — 변환 규칙",render:function(c){c.innerHTML=`
<div class="explanation">
<p>C는 <span style="color:var(--purple)">float</span> (single)과 <span style="color:var(--purple)">double</span> (double precision)을 지원합니다.</p>
<p><strong>캐스팅 시 변환 규칙:</strong></p>
<table class="info-table">
<tr><th>변환</th><th>동작</th><th>주의</th></tr>
<tr><td>double/float → int</td><td>소수부 잘라냄 (toward zero)</td><td>범위 초과/NaN → 보통 TMin</td></tr>
<tr><td>int → double</td><td><strong>정확한 변환</strong></td><td>int가 53비트 이내면 OK</td></tr>
<tr><td>int → float</td><td>반올림 발생 가능</td><td>float의 significand = 23비트 &lt; 32비트 int</td></tr>
</table>
<div class="warning-box">
<strong>int → float</strong> 변환에서 정밀도 손실이 발생할 수 있습니다! 32비트 int는 최대 \\(2^{31}\\)까지인데, float의 significand는 24비트(23+1)뿐이므로 큰 정수는 반올림됩니다.
</div>
</div>`}},
// ===== 34: FP Puzzles (p34) =====
{title:"Floating Point 퍼즐",render:function(c){c.innerHTML=`
<div class="explanation">
<p><span style="color:var(--purple)">int x; float f; double d;</span> — d, f는 NaN이 아닐 때:</p>
<table class="info-table">
<tr><th>표현식</th><th>참?</th><th>이유</th></tr>
<tr><td>x == (int)(float) x</td><td><strong>No</strong></td><td>float의 24비트 significand로는 큰 int 정확히 표현 불가</td></tr>
<tr><td>x == (int)(double) x</td><td><em>Yes</em></td><td>double의 53비트 significand > 32비트 int</td></tr>
<tr><td>f == (float)(double) f</td><td><em>Yes</em></td><td>정밀도가 올라가므로 손실 없음</td></tr>
<tr><td>d == (double)(float) d</td><td><strong>No</strong></td><td>double → float에서 정밀도 손실</td></tr>
<tr><td>f == -(-f)</td><td><em>Yes</em></td><td>부호 비트만 토글</td></tr>
<tr><td>2/3 == 2/3.0</td><td><strong>No</strong></td><td>2/3은 정수 나눗셈 = 0, 2/3.0은 FP 나눗셈 ≈ 0.667</td></tr>
<tr><td>d &lt; 0.0 ⇒ (d*2) &lt; 0.0</td><td><em>Yes</em></td><td>부호 유지 (오버플로우 → -∞도 음수)</td></tr>
<tr><td>d &gt; f ⇒ -f &gt; -d</td><td><em>Yes</em></td><td>부호 반전으로 부등호 반전</td></tr>

let cur=0;
function renderSlide(){const app=document.getElementById('content');app.innerHTML='';const nav=document.createElement('div');nav.className='nav';nav.innerHTML='<button onclick="goSlide(0)">목차</button><button onclick="prev()"'+(cur===0?' disabled':'')+'>◀ 이전</button><span class="slide-num">'+(cur+1)+' / '+slides.length+'</span><button onclick="next()"'+(cur===slides.length-1?' disabled':'')+'>다음 ▶</button><div class="progress-bar"><div class="progress-fill" style="width:'+((cur+1)/slides.length*100)+'%"></div></div>';app.appendChild(nav);const slide=document.createElement('div');slide.className='slide';const t=document.createElement('div');t.className='slide-title';t.innerHTML='<span class="num">'+(cur+1)+'</span>'+slides[cur].title;slide.appendChild(t);const body=document.createElement('div');slides[cur].render(body);slide.appendChild(body);app.appendChild(slide);window.scrollTo({top:0,behavior:'smooth'});if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise([slide]).catch(function(e){})}}
function next(){if(cur<slides.length-1){cur++;renderSlide()}}
function prev(){if(cur>0){cur--;renderSlide()}}
function goSlide(n){cur=n;renderSlide()}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key==='ArrowDown')next();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev()});
