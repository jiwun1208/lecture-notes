const slides=[
{title:"강의 개요",render:function(c){c.innerHTML=`<div class="explanation"><p>이 강의는 C 코드가 <strong>기계어(Machine Code)</strong>로 변환되는 과정과, x86-64 어셈블리의 기초를 다룹니다.</p><div class="toc"><div class="toc-item" onclick="goSlide(1)"><span class="toc-num">01</span> 강의 소개</div><div class="toc-item" onclick="goSlide(3)"><span class="toc-num">03</span> Intel x86 프로세서 역사</div><div class="toc-item" onclick="goSlide(7)"><span class="toc-num">08</span> C → 어셈블리 → 기계어</div><div class="toc-item" onclick="goSlide(16)"><span class="toc-num">17</span> 디스어셈블리</div><div class="toc-item" onclick="goSlide(19)"><span class="toc-num">20</span> 레지스터</div><div class="toc-item" onclick="goSlide(21)"><span class="toc-num">22</span> 데이터 이동 (mov)</div><div class="toc-item" onclick="goSlide(25)"><span class="toc-num">26</span> swap 예제</div><div class="toc-item" onclick="goSlide(31)"><span class="toc-num">32</span> 주소 계산 & 산술 연산</div><div class="toc-item" onclick="goSlide(37)"><span class="toc-num">38</span> 산술 표현식 예제</div></div></div>`}},
// 1: 표지
{title:"강의 소개",render:function(c){c.innerHTML=`<div class="explanation"><div class="highlight-box"><strong>과목:</strong> System Programming (CSE306) · DGIST<br><strong>주제:</strong> Chapter 4 — Machine-level Programming I: Basics<br><strong>담당:</strong> Prof. Yongwoo Lee</div><p>C 언어 뒤에서 실제로 어떤 일이 일어나는지를 배웁니다. 컴파일러가 C 코드를 어떻게 어셈블리 명령어로 변환하는지, CPU의 레지스터와 메모리를 어떻게 사용하는지를 이해합니다.</p></div>`}},
// 2: 로드맵
{title:"로드맵",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>파트</th><th>내용</th></tr><tr><td><strong>1. Intel 역사</strong></td><td>x86 프로세서의 진화, CISC vs RISC</td></tr><tr><td><strong>2. C → 기계어</strong></td><td>컴파일 → 어셈블 → 링크 과정, 어셈블리 특성</td></tr><tr><td><strong>3. 어셈블리 기초</strong></td><td>레지스터, 오퍼랜드, mov 명령어, 주소 지정 모드</td></tr><tr><td><strong>4. 산술/논리 연산</strong></td><td>leaq, add, sub, imul, shift, and, or, xor</td></tr></table></div>`}},
// 3: Intel x86 (p3)
{title:"Intel x86 프로세서",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>Intel x86</strong>은 랩탑/데스크탑/서버 시장을 지배하는 프로세서 아키텍처입니다.</p><div class="highlight-box"><strong>핵심 특징:</strong><br>• <strong>진화적 설계(Evolutionary Design):</strong> 1978년 8086부터 <em>하위 호환</em>을 유지하며 발전<br>• <strong>CISC</strong> (Complex Instruction Set Computer): 다양한 명령어와 형식. 하지만 Linux에서는 일부만 사용</div><p><strong>CISC vs RISC:</strong></p><table class="info-table"><tr><th></th><th>CISC (x86)</th><th>RISC (ARM, RISC-V)</th></tr><tr><td>명령어 수</td><td>매우 많음</td><td>적음</td></tr><tr><td>명령어 형식</td><td>다양</td><td>균일</td></tr><tr><td>장점</td><td>속도 (Intel 최적화)</td><td>저전력, 단순 설계</td></tr></table><div class="key-point">현재 <strong>RISC 르네상스</strong>: ARM(모바일), RISC-V(오픈소스)가 저전력 시장에서 부상 중입니다.</div></div>`}},
// 4: Intel Milestones (p4)
{title:"Intel x86 진화 — 마일스톤",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>프로세서</th><th>연도</th><th>트랜지스터</th><th>특징</th></tr><tr><td><strong>8086</strong></td><td>1978</td><td>29K</td><td>최초 16비트 Intel CPU. IBM PC의 기반. 1MB 주소 공간</td></tr><tr><td><strong>386</strong></td><td>1985</td><td>275K</td><td>최초 32비트 (IA32). Flat addressing, Unix 구동 가능</td></tr><tr><td><strong>Pentium 4E</strong></td><td>2004</td><td>125M</td><td>최초 64비트 x86 (x86-64)</td></tr><tr><td><strong>Core 2</strong></td><td>2006</td><td>291M</td><td>최초 멀티코어</td></tr><tr><td><strong>Core i7</strong></td><td>2008</td><td>731M</td><td>4코어</td></tr></table><div class="highlight-box">추가된 기능들: 멀티미디어 명령어, 효율적인 조건부 연산, 32비트 → 64비트 전환</div></div>`}},
// 5: Intel cont. (p5)
{title:"최신 프로세서와 AMD",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>최신 프로세서:</strong> 더 많은 코어와 트랜지스터로 병렬 처리 강화. GPU, 이미지 처리, 메모리 컨트롤러, NPU 등 <em>특수 목적 유닛</em> 내장.</p><p><strong>AMD:</strong></p><div class="highlight-box">• 역사적으로 Intel 약간 뒤에서 따라가며 더 저렴한 제품 제공<br>• DEC 등에서 최고급 회로 설계자를 영입<br>• <strong>x86-64</strong>를 AMD가 독자 개발! (Intel은 나중에 채택)</div></div>`}},
// 6: 로드맵 - C/Assembly (p7)
{title:"로드맵 — C, 어셈블리, 기계어",render:function(c){c.innerHTML=`<div class="explanation"><div class="section-divider">— C, Assembly, Machine Code —</div><p>프로그래머가 작성하는 C 코드가 CPU가 실행하는 기계어까지 어떤 과정을 거치는지 배웁니다.</p></div>`}},
// 7: Definitions (p8)
{title:"핵심 용어 정의",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>용어</th><th>의미</th><th>예시</th></tr><tr><td><strong>Architecture (ISA)</strong></td><td>어셈블리/기계어를 작성하기 위해 알아야 하는 프로세서 설계의 부분</td><td>명령어 집합, 레지스터</td></tr><tr><td><strong>Microarchitecture</strong></td><td>아키텍처의 <em>구현</em> 방식</td><td>캐시 크기, 클럭 주파수</td></tr><tr><td><strong>Machine Code</strong></td><td>프로세서가 실행하는 바이트 수준 프로그램</td><td>0x48 0x89 0xd3</td></tr><tr><td><strong>Assembly Code</strong></td><td>기계어의 텍스트 표현</td><td>movq %rdx, %rbx</td></tr></table><div class="key-point"><strong>ISA 예시:</strong> Intel x86/x86-64, ARM (거의 모든 스마트폰에 사용)</div></div>`}},
// 8: Assembly/Machine Code View (p9)
{title:"어셈블리/기계어 관점 — CPU 상태",render:function(c){c.innerHTML=`<div class="explanation"><p>어셈블리 프로그래머가 볼 수 있는 <strong>프로세서 상태(Programmer-Visible State)</strong>:</p><table class="info-table"><tr><th>구성 요소</th><th>설명</th></tr><tr><td><strong>PC (Program Counter)</strong></td><td>다음 실행할 명령어의 주소. x86-64에서는 <span style="color:var(--purple)">%rip</span>이라 부름</td></tr><tr><td><strong>Register File</strong></td><td>16개의 범용 레지스터. 자주 사용되는 프로그램 데이터 저장</td></tr><tr><td><strong>Condition Codes</strong></td><td>가장 최근 산술/논리 연산의 상태 정보. 조건 분기에 사용</td></tr><tr><td><strong>Memory</strong></td><td>바이트 단위로 주소 지정. 코드, 데이터, 스택 저장</td></tr></table></div>`}},
// 9: Turning C into Object Code (p10)
{title:"C → 실행 파일 변환 과정",render:function(c){c.innerHTML=`<div class="explanation"><div class="code-block">gcc -Og p1.c p2.c -o p</div><p>변환은 4단계로 이루어집니다:</p><div class="code-block">C program (p1.c, p2.c)        [텍스트]
        ↓  Compiler (gcc -Og -S)
Asm program (p1.s, p2.s)       [텍스트]
        ↓  Assembler (as)
Object program (p1.o, p2.o)    [바이너리]
        ↓  Linker (ld)         + Static libraries (.a)
Executable program (p)         [바이너리]</div><div class="highlight-box"><strong>-Og</strong>: 디버깅에 적합한 기본 최적화. 어셈블리를 읽기 쉽게 만듦. -O2나 -O3는 적극적 최적화로 읽기 어려운 코드 생성.</div></div>`}},
// 10: Compiling Into Assembly (p11)
{title:"C에서 어셈블리로 — 컴파일 결과",render:function(c){c.innerHTML=`<div class="explanation"><div class="code-block">// C Code (sum.c)
long plus(long x, long y);
void sumstore(long x, long y, long *dest) {
    long t = plus(x, y);
    *dest = t;
}</div><p><span style="color:var(--purple)">gcc -Og -S sum.c</span> → sum.s 생성:</p><div class="code-block">sumstore:
    pushq   %rbx          # rbx를 스택에 저장 (callee-save)
    movq    %rdx, %rbx    # dest를 rbx에 복사
    call    plus           # plus(x, y) 호출 → 결과는 %rax에
    movq    %rax, (%rbx)   # *dest = t (rax의 값을 rbx가 가리키는 메모리에)
    popq    %rbx           # rbx 복원
    ret                    # 반환</div><div class="key-point">C의 6줄 함수가 어셈블리 6줄 명령어로 변환되었습니다. 각 줄이 CPU가 실행하는 하나의 동작에 대응합니다.</div></div>`}},
// 11: Assembly Data Types (p12)
{title:"어셈블리의 데이터 타입",render:function(c){c.innerHTML=`<div class="explanation"><p>어셈블리는 <strong>타입이 없는(untyped) 언어</strong>입니다.</p><div class="highlight-box"><strong>데이터:</strong><br>• "정수" 데이터: 1, 2, 4, 8 바이트 — 값 또는 주소(포인터)<br>• 부동소수점 데이터: 4, 8, 10 바이트<br>• 배열이나 구조체 같은 집합 타입은 없음 — 메모리에 연속 배치된 바이트일 뿐</div><p><strong>코드:</strong> 명령어를 인코딩한 바이트 시퀀스</p><div class="warning-box">컴파일러가 타입 정보를 모두 없앤다는 뜻입니다. 어셈블리 수준에서는 int와 포인터가 구분되지 않습니다.</div></div>`}},
// 12: Assembly Operations (p13)
{title:"어셈블리의 연산 종류",render:function(c){c.innerHTML=`<div class="explanation"><p>어셈블리 명령어는 크게 3가지로 분류됩니다:</p><table class="info-table"><tr><th>분류</th><th>설명</th><th>예시</th></tr><tr><td><strong>산술/논리 연산</strong></td><td>레지스터나 메모리 데이터에 대한 계산</td><td>addq, subq, andq</td></tr><tr><td><strong>데이터 전송</strong></td><td>메모리 ↔ 레지스터 간 데이터 이동</td><td>movq (load/store)</td></tr><tr><td><strong>제어 전환</strong></td><td>무조건 점프, 조건 분기, 함수 호출/반환</td><td>jmp, je, call, ret</td></tr></table></div>`}},
// 13: Object Code (p14)
{title:"Object Code — 기계어",render:function(c){c.innerHTML=`<div class="explanation"><p>어셈블러(Assembler)가 .s 파일을 .o 파일(바이너리)로 변환합니다:</p><div class="code-block">sumstore 시작 주소: 0x0400595

pushq  %rbx         →  0x53             (1 바이트)
movq   %rdx, %rbx   →  0x48 0x89 0xd3   (3 바이트)
call   plus          →  0xe8 0xf2 0xff 0xff 0xff  (5 바이트)
movq   %rax, (%rbx)  →  0x48 0x89 0x03   (3 바이트)
popq   %rbx          →  0x5b             (1 바이트)
ret                  →  0xc3             (1 바이트)
                                 총 14 바이트</div><div class="key-point">각 명령어는 <strong>1, 3, 또는 5 바이트</strong>로 인코딩됩니다. CISC의 특징 — 명령어마다 길이가 다릅니다. (RISC는 보통 고정 4바이트)</div></div>`}},
// 14: Linking (p15)
{title:"링킹 — Linker",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>링커(Linker)</strong>의 역할:</p><div class="highlight-box">• 여러 .o 파일 간의 <strong>참조를 해결</strong> (예: sumstore에서 plus 호출)<br>• <strong>정적 라이브러리</strong>(.a)와 결합 (malloc, printf 등의 코드)<br>• 일부 라이브러리는 <strong>동적 링킹</strong> — 프로그램 실행 시점에 연결</div></div>`}},
// 15: Machine Instruction Example (p16)
{title:"기계어 명령어 예제",render:function(c){c.innerHTML=`<div class="explanation"><p>C의 <span style="color:var(--purple)">*dest = t;</span>가 기계어까지 변환되는 과정:</p><table class="info-table"><tr><th>수준</th><th>표현</th><th>설명</th></tr><tr><td><strong>C</strong></td><td>*dest = t;</td><td>dest가 가리키는 곳에 t 저장</td></tr><tr><td><strong>Assembly</strong></td><td>movq %rax, (%rbx)</td><td>rax의 8바이트 값을 rbx가 가리키는 메모리에 이동</td></tr><tr><td><strong>Machine</strong></td><td>48 89 03</td><td>3바이트 명령어, 주소 0x40059e에 저장</td></tr></table><div class="highlight-box"><strong>movq</strong>의 q는 <em>quad word</em>(8바이트). x86-64에서 크기 접미사: <strong>b</strong>(1), <strong>w</strong>(2), <strong>l</strong>(4), <strong>q</strong>(8)</div></div>`}},
// 16: Disassembling (p17)
{title:"디스어셈블리 — objdump",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>디스어셈블러</strong>: 기계어 바이트를 어셈블리 코드로 역변환합니다.</p><div class="code-block">$ objdump -d sum

0000000000400595 &lt;sumstore&gt;:
  400595: 53                push   %rbx
  400596: 48 89 d3          mov    %rdx,%rbx
  400599: e8 f2 ff ff ff    callq  400590 &lt;plus&gt;
  40059e: 48 89 03          mov    %rax,(%rbx)
  4005a1: 5b                pop    %rbx
  4005a2: c3                retq</div><p>실행 파일(.out)이나 오브젝트 파일(.o) 모두에 사용 가능합니다.</p></div>`}},
// 17: GDB Disassembly (p18)
{title:"GDB에서 디스어셈블리",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>gdb</strong> 디버거에서도 디스어셈블리할 수 있습니다:</p><div class="code-block">$ gdb sum
(gdb) disassemble sumstore        # 함수 디스어셈블
(gdb) x/14xb sumstore              # 14바이트를 16진수로 출력</div><p>gdb는 objdump와 거의 동일한 결과를 보여주지만, 디버깅 중 실시간으로 확인할 수 있다는 장점이 있습니다.</p></div>`}},
// 18: What can be disassembled (p19)
{title:"무엇이든 디스어셈블 가능",render:function(c){c.innerHTML=`<div class="explanation"><p>실행 가능한 코드로 해석할 수 있는 <strong>모든 바이트</strong>를 디스어셈블할 수 있습니다. 심지어 Windows의 WINWORD.EXE도!</p><div class="code-block">$ objdump -d WINWORD.EXE
30001000: 55              push   %ebp
30001001: 8b ec           mov    %esp,%ebp
30001003: 6a ff           push   $0xffffffff</div><div class="warning-box"><strong>주의:</strong> Microsoft EULA는 역공학(reverse engineering)을 금지합니다. 하지만 기술적으로는 가능합니다.</div></div>`}},
// 19: 로드맵 - Registers (p20)
{title:"로드맵 — 레지스터, 오퍼랜드, mov",render:function(c){c.innerHTML=`<div class="explanation"><div class="section-divider">— Assembly Basics: Registers, Operands, Move —</div><p>CPU 내부의 레지스터와 데이터를 이동하는 mov 명령어를 배웁니다.</p></div>`}},
// 20: x86-64 Registers (p21)
{title:"x86-64 정수 레지스터 — 16개",render:function(c){c.innerHTML=`<div class="explanation"><p>x86-64에는 <strong>16개의 범용 정수 레지스터</strong>가 있습니다 (각 8바이트):</p><div class="code-block">64비트    32비트      64비트    32비트
%rax      %eax       %r8       %r8d
%rbx      %ebx       %r9       %r9d
%rcx      %ecx       %r10      %r10d
%rdx      %edx       %r11      %r11d
%rsi      %esi       %r12      %r12d
%rdi      %edi       %r13      %r13d
%rsp      %esp       %r14      %r14d
%rbp      %ebp       %r15      %r15d</div><p>하위 4바이트(%eax), 2바이트(%ax), 1바이트(%al)도 개별 접근 가능합니다.</p><div class="key-point"><strong>%rsp</strong>는 스택 포인터로 특수 용도. 나머지도 함수 호출 규약에 따라 역할이 있지만 (rdi=1번째 인자, rsi=2번째 등), 기본적으로 범용입니다.</div></div>`}},
// 21: IA32 History (p22)
{title:"레지스터의 역사 — IA32",render:function(c){c.innerHTML=`<div class="explanation"><p>32비트 시절(IA32)에는 8개의 레지스터만 있었습니다. 각각 원래 이름이 있었습니다:</p><table class="info-table"><tr><th>레지스터</th><th>원래 용도</th></tr><tr><td>%eax</td><td><em>Accumulate</em> — 산술 결과 저장</td></tr><tr><td>%ecx</td><td><em>Counter</em> — 루프 카운터</td></tr><tr><td>%edx</td><td><em>Data</em> — 데이터</td></tr><tr><td>%ebx</td><td><em>Base</em> — 기준 주소</td></tr><tr><td>%esi / %edi</td><td><em>Source/Destination Index</em></td></tr><tr><td>%esp</td><td><em>Stack Pointer</em></td></tr><tr><td>%ebp</td><td><em>Base Pointer</em></td></tr></table><p>x86-64에서 %r8~%r15가 추가되어 총 16개가 되었습니다.</p></div>`}},
// 22: Moving Data (p23)
{title:"데이터 이동 — movq",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>movq Source, Dest</strong> — 8바이트 데이터를 Source에서 Dest로 이동</p><p>오퍼랜드의 3가지 종류:</p><table class="info-table"><tr><th>종류</th><th>표기법</th><th>의미</th><th>예시</th></tr><tr><td><strong>Immediate</strong></td><td>$값</td><td>상수 정수</td><td>$0x400, $-533</td></tr><tr><td><strong>Register</strong></td><td>%레지스터</td><td>16개 레지스터 중 하나</td><td>%rax, %r13</td></tr><tr><td><strong>Memory</strong></td><td>(레지스터)</td><td>레지스터가 가리키는 주소의 메모리 8바이트</td><td>(%rax)</td></tr></table></div>`}},
// 23: movq Combinations (p24)
{title:"movq 오퍼랜드 조합",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>Source</th><th>Dest</th><th>어셈블리</th><th>C 비유</th></tr><tr><td>Imm</td><td>Reg</td><td>movq $0x4, %rax</td><td>temp = 0x4;</td></tr><tr><td>Imm</td><td>Mem</td><td>movq $-147, (%rax)</td><td>*p = -147;</td></tr><tr><td>Reg</td><td>Reg</td><td>movq %rax, %rdx</td><td>temp2 = temp1;</td></tr><tr><td>Reg</td><td>Mem</td><td>movq %rax, (%rdx)</td><td>*p = temp;</td></tr><tr><td>Mem</td><td>Reg</td><td>movq (%rax), %rdx</td><td>temp = *p;</td></tr></table><div class="warning-box"><strong>Memory → Memory 직접 전송은 불가!</strong> 반드시 레지스터를 거쳐야 합니다. 이것이 CISC인 x86에서도 지키는 제약입니다.</div></div>`}},
// 24: Simple Addressing Modes (p25)
{title:"메모리 주소 지정 모드",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>Normal: (R)</strong> → Mem[Reg[R]]</p><div class="code-block">movq (%rcx), %rax    # rcx가 가리키는 주소에서 읽기 = *rcx</div><p><strong>Displacement: D(R)</strong> → Mem[Reg[R] + D]</p><div class="code-block">movq 8(%rbp), %rdx   # rbp + 8 위치에서 읽기 = *(rbp+8)</div><p>(R)은 C의 <span style="color:var(--purple)">*ptr</span>, D(R)은 <span style="color:var(--purple)">*(ptr + offset)</span>에 해당합니다. 구조체 멤버 접근이나 스택 변수 접근에 사용됩니다.</p></div>`}},
// 25-30: swap 예제 (p26-31)
{title:"swap 예제 — C와 어셈블리",render:function(c){c.innerHTML=`<div class="explanation"><div class="code-block">void swap(long *xp, long *yp) {
    long t0 = *xp;
    long t1 = *yp;
    *xp = t1;
    *yp = t0;
}</div><div class="code-block">swap:
    movq  (%rdi), %rax    # t0 = *xp     (rdi = xp)
    movq  (%rsi), %rdx    # t1 = *yp     (rsi = yp)
    movq  %rdx, (%rdi)    # *xp = t1
    movq  %rax, (%rsi)    # *yp = t0
    ret</div><table class="info-table"><tr><th>레지스터</th><th>용도</th></tr><tr><td>%rdi</td><td>첫 번째 인자 xp</td></tr><tr><td>%rsi</td><td>두 번째 인자 yp</td></tr><tr><td>%rax</td><td>임시 변수 t0</td></tr><tr><td>%rdx</td><td>임시 변수 t1</td></tr></table></div>`}},
{title:"swap 실행 추적",render:function(c){c.innerHTML=`<div class="explanation"><p>xp = 0x120 (값 123), yp = 0x100 (값 456)일 때 단계별 실행:</p><table class="info-table"><tr><th>단계</th><th>명령어</th><th>%rax</th><th>%rdx</th><th>M[0x120]</th><th>M[0x100]</th></tr><tr><td>초기</td><td>—</td><td>—</td><td>—</td><td>123</td><td>456</td></tr><tr><td>1</td><td>movq (%rdi), %rax</td><td><strong>123</strong></td><td>—</td><td>123</td><td>456</td></tr><tr><td>2</td><td>movq (%rsi), %rdx</td><td>123</td><td><strong>456</strong></td><td>123</td><td>456</td></tr><tr><td>3</td><td>movq %rdx, (%rdi)</td><td>123</td><td>456</td><td><strong>456</strong></td><td>456</td></tr><tr><td>4</td><td>movq %rax, (%rsi)</td><td>123</td><td>456</td><td>456</td><td><strong>123</strong></td></tr></table><div class="key-point">레지스터를 임시 저장소로 사용하여 두 메모리 값을 교환합니다. C에서 temp 변수를 쓰는 것과 같은 원리입니다.</div></div>`}},
// 27: Complete Addressing Modes (p32)
{title:"완전한 메모리 주소 지정 모드",render:function(c){c.innerHTML=`<div class="explanation"><p>가장 일반적인 형태:</p><div class="math-block">\\(D(Rb, Ri, S) = Mem[Reg[Rb] + S \\times Reg[Ri] + D]\\)</div><table class="info-table"><tr><th>구성 요소</th><th>의미</th><th>제약</th></tr><tr><td><strong>D</strong></td><td>상수 변위(displacement)</td><td>1, 2, 4 바이트</td></tr><tr><td><strong>Rb</strong></td><td>Base 레지스터</td><td>16개 중 아무거나</td></tr><tr><td><strong>Ri</strong></td><td>Index 레지스터</td><td>%rsp 제외</td></tr><tr><td><strong>S</strong></td><td>Scale (배율)</td><td>1, 2, 4, 8만 가능</td></tr></table><p>Scale이 1, 2, 4, 8인 이유: 각각 char, short, int, long 배열의 원소 크기!</p><div class="highlight-box"><strong>배열 접근 패턴:</strong> <span style="color:var(--purple)">A[i]</span> → M[&A + S*i] → 어셈블리에서 (%rbx,%rcx,S) 형태로 표현</div></div>`}},
// 28: Address Examples (p33)
{title:"주소 계산 예제",render:function(c){c.innerHTML=`<div class="explanation"><p>%rdx = 0xf000, %rcx = 0x0100일 때:</p><table class="info-table"><tr><th>표현식</th><th>계산</th><th>결과 주소</th></tr><tr><td>0x8(%rdx)</td><td>0xf000 + 0x8</td><td><strong>0xf008</strong></td></tr><tr><td>(%rdx,%rcx)</td><td>0xf000 + 0x100</td><td><strong>0xf100</strong></td></tr><tr><td>(%rdx,%rcx,4)</td><td>0xf000 + 4×0x100</td><td><strong>0xf400</strong></td></tr><tr><td>0x80(,%rdx,2)</td><td>2×0xf000 + 0x80</td><td><strong>0x1e080</strong></td></tr></table></div>`}},
// 29: 로드맵 - Arithmetic (p34)
{title:"로드맵 — 산술/논리 연산",render:function(c){c.innerHTML=`<div class="explanation"><div class="section-divider">— Arithmetic & Logical Operations —</div><p>leaq와 주요 산술/논리 명령어를 배웁니다.</p></div>`}},
// 30: leaq (p35)
{title:"leaq — 주소 계산 명령어",render:function(c){c.innerHTML=`<div class="explanation"><p><strong>leaq Src, Dst</strong> — "Load Effective Address". 메모리 접근 <em>없이</em> 주소 계산 결과만 레지스터에 저장합니다.</p><p><strong>용도 1:</strong> 포인터 산술 — <span style="color:var(--purple)">p = &x[i];</span></p><p><strong>용도 2:</strong> \\(x + k \\times y\\) 형태의 산술 계산 (k = 1, 2, 4, 8)</p><div class="code-block">// C Code
long m12(long x) { return x*12; }

// Assembly
leaq (%rdi,%rdi,2), %rax    # rax = x + x*2 = 3x
salq $2, %rax                # rax = 3x << 2 = 3x * 4 = 12x</div><div class="key-point">leaq는 메모리를 읽지 않습니다! 주소 계산 회로를 "빌려서" 빠른 곱셈(×3, ×5, ×9 등)에 활용하는 것입니다.</div></div>`}},
// 31: Two Operand Instructions (p36)
{title:"2-오퍼랜드 산술 명령어",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>명령어</th><th>동작</th><th>비고</th></tr><tr><td><strong>addq</strong> Src, Dest</td><td>Dest = Dest + Src</td><td>덧셈</td></tr><tr><td><strong>subq</strong> Src, Dest</td><td>Dest = Dest - Src</td><td>뺄셈</td></tr><tr><td><strong>imulq</strong> Src, Dest</td><td>Dest = Dest × Src</td><td>곱셈</td></tr><tr><td><strong>salq</strong> Src, Dest</td><td>Dest = Dest &lt;&lt; Src</td><td>왼쪽 시프트 (= shlq)</td></tr><tr><td><strong>sarq</strong> Src, Dest</td><td>Dest = Dest &gt;&gt; Src</td><td>Arithmetic 오른쪽 시프트</td></tr><tr><td><strong>shrq</strong> Src, Dest</td><td>Dest = Dest &gt;&gt; Src</td><td>Logical 오른쪽 시프트</td></tr><tr><td><strong>xorq</strong> Src, Dest</td><td>Dest = Dest ^ Src</td><td></td></tr><tr><td><strong>andq</strong> Src, Dest</td><td>Dest = Dest & Src</td><td></td></tr><tr><td><strong>orq</strong> Src, Dest</td><td>Dest = Dest | Src</td><td></td></tr></table><div class="warning-box"><strong>인자 순서 주의!</strong> AT&T 문법에서 결과는 <em>두 번째</em> 오퍼랜드에 저장됩니다. Intel 문법과 반대!<br>signed/unsigned 구분 없음 — Two's Complement 덕분에 비트 연산이 동일합니다.</div></div>`}},
// 32: One Operand Instructions (p37)
{title:"1-오퍼랜드 산술 명령어",render:function(c){c.innerHTML=`<div class="explanation"><table class="info-table"><tr><th>명령어</th><th>동작</th></tr><tr><td><strong>incq</strong> Dest</td><td>Dest = Dest + 1</td></tr><tr><td><strong>decq</strong> Dest</td><td>Dest = Dest - 1</td></tr><tr><td><strong>negq</strong> Dest</td><td>Dest = -Dest (부호 반전)</td></tr><tr><td><strong>notq</strong> Dest</td><td>Dest = ~Dest (비트 반전)</td></tr></table></div>`}},
// 33-36: Arithmetic Expression Example (p38-41)
{title:"산술 표현식 예제 — C와 어셈블리 대응",render:function(c){c.innerHTML=`<div class="explanation"><div class="code-block">long arith(long x, long y, long z) {
    long t1 = x + y;
    long t2 = z + t1;
    long t3 = x + 4;
    long t4 = y * 48;
    long t5 = t3 + t4;
    long rval = t2 * t5;
    return rval;
}</div><div class="code-block">arith:
  leaq  (%rdi,%rsi), %rax       # rax = x+y       (t1)
  addq  %rdx, %rax              # rax = z+t1       (t2)
  leaq  (%rsi,%rsi,2), %rdx     # rdx = y+y*2 = 3y
  salq  $4, %rdx                # rdx = 3y*16 = 48y (t4)
  leaq  4(%rdi,%rdx), %rcx      # rcx = x+4+48y    (t5)
  imulq %rcx, %rax              # rax = t2*t5       (rval)
  ret</div><div class="key-point"><strong>C에는 곱셈이 2개</strong>(y*48, t2*t5)이지만, <strong>어셈블리에는 imulq가 1개</strong>뿐입니다. y*48은 leaq + salq로 대체되었습니다:<br>48 = 3 × 16 → leaq로 ×3, salq $4로 ×16</div></div>`}},
// 34: Summary (p42)
{title:"요약 — Machine Programming I",render:function(c){c.innerHTML=`<div class="explanation"><div class="key-point"><strong>핵심 정리:</strong><br><br>• <strong>Intel x86:</strong> 진화적 설계 → 많은 호환성 유산과 복잡성<br>• <strong>C → 기계어:</strong> 컴파일러 → 어셈블러 → 링커 과정. 새로운 가시 상태: PC, 레지스터, 조건 코드<br>• <strong>어셈블리 기초:</strong> 16개 레지스터, movq로 데이터 이동, 다양한 주소 지정 모드<br>• <strong>산술 연산:</strong> 컴파일러가 leaq, shift 등을 조합하여 효율적인 명령어 시퀀스 생성</div></div>`}}
];
